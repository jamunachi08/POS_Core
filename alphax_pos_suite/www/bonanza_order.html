<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Order</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--brand:#0B6B5B;--brand-deep:#084A3F;--accent:#B8860B;--canvas:#F6F4EF;--surface:#fff;--surface-2:#EFECE4;--ink:#1C1A17;--muted:#6B6760;--faint:#9A958C;--border:rgba(0,0,0,.08);--pos:#0F6E56;--radius:14px;--font:'Plus Jakarta Sans',system-ui,sans-serif;--font-ar:'IBM Plex Sans Arabic',sans-serif}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:var(--font);background:var(--canvas);color:var(--ink);font-size:15px;line-height:1.45;-webkit-font-smoothing:antialiased}
body[dir=rtl]{font-family:var(--font-ar)}
[v-cloak]{display:none}
.num{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.wrap{max-width:560px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--canvas)}
.hero{background:linear-gradient(150deg,var(--brand),var(--brand-deep));color:#fff;padding:18px 18px 16px;position:sticky;top:0;z-index:10}
.hero-top{display:flex;align-items:center;justify-content:space-between}
.hero .mark{display:flex;align-items:center;gap:10px}
.hero .mark .logo{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-weight:800;font-size:18px}
.hero b{font-size:16px;font-weight:800;display:block;line-height:1.15}
.hero span{font-size:12px;opacity:.85}
.lang{background:rgba(255,255,255,.16);border-radius:10px;height:36px;padding:0 12px;color:#fff;font-weight:700;font-size:13px}
.table-pill{margin-top:12px;display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.16);padding:6px 12px;border-radius:9px;font-size:12.5px;font-weight:600}
.cats{position:sticky;top:96px;z-index:9;background:var(--canvas);display:flex;gap:8px;overflow-x:auto;padding:12px 16px;border-bottom:1px solid var(--border)}
.cat{flex:0 0 auto;height:38px;padding:0 15px;border-radius:20px;background:var(--surface);border:1px solid var(--border);font-weight:600;font-size:13.5px;color:var(--muted);white-space:nowrap}
.cat.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.list{flex:1;padding:8px 16px 130px}
.sec-title{font-size:13px;font-weight:800;color:var(--brand-deep);text-transform:uppercase;letter-spacing:.4px;margin:16px 4px 8px}
.item{display:flex;gap:13px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:10px}
.item .thumb{width:54px;height:54px;border-radius:11px;background:var(--surface-2);display:grid;place-items:center;font-size:26px;flex-shrink:0;overflow:hidden}
.item .thumb img{width:100%;height:100%;object-fit:cover}
.item .info{flex:1;min-width:0}
.item .nm{font-weight:700;font-size:14.5px;line-height:1.25}
.item .pr{font-weight:700;font-size:14px;color:var(--brand-deep);margin-top:3px}.item .pr .cur{font-size:11px;color:var(--faint);font-weight:600}
.add{width:40px;height:40px;border-radius:11px;background:var(--brand);color:#fff;font-size:24px;font-weight:600;display:grid;place-items:center;flex-shrink:0}
.stepper{display:flex;align-items:center;gap:2px;background:var(--surface-2);border-radius:11px;padding:3px;flex-shrink:0}
.stepper button{width:34px;height:34px;border-radius:9px;font-size:20px;font-weight:600;display:grid;place-items:center}.stepper button:active{background:var(--surface)}
.stepper .n{min-width:26px;text-align:center;font-weight:800;font-size:15px}
.barbtn{position:fixed;left:0;right:0;bottom:0;max-width:560px;margin:0 auto;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--canvas) 22%)}
.review{width:100%;height:58px;border-radius:16px;background:var(--brand);color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 8px 24px -8px rgba(11,107,91,.6)}
.review .count{background:rgba(255,255,255,.22);border-radius:8px;min-width:26px;height:26px;display:grid;place-items:center;font-size:13px}
.review .amt{margin-inline-start:auto}
.review.dim{background:var(--surface-2);color:var(--faint);box-shadow:none;pointer-events:none}
.scrim{position:fixed;inset:0;background:rgba(20,18,14,.5);z-index:40;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--surface);width:100%;max-width:560px;border-radius:22px 22px 0 0;max-height:88vh;display:flex;flex-direction:column;animation:up .28s cubic-bezier(.2,.9,.3,1.05)}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet-h{padding:18px 20px 8px;display:flex;align-items:center;justify-content:space-between}
.sheet-h h3{font-size:18px;font-weight:800}
.sheet-h .x{width:34px;height:34px;border-radius:10px;background:var(--surface-2);font-size:18px;display:grid;place-items:center}
.sheet-body{overflow:auto;padding:6px 20px 16px}
.cl{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.cl .info{flex:1}.cl .nm{font-weight:700;font-size:14px}.cl .pr{font-size:12.5px;color:var(--muted);margin-top:2px}
.cust{margin-top:14px}.cust label{font-size:12px;font-weight:700;color:var(--muted);display:block;margin:10px 0 5px}
.cust input{width:100%;height:48px;border:1px solid var(--border);border-radius:12px;padding:0 14px;font-size:15px;font-family:inherit;background:var(--surface);outline:none}
.cust input:focus{border-color:var(--brand)}
.totals{margin-top:14px;background:var(--surface-2);border-radius:14px;padding:13px 16px}
.tr{display:flex;justify-content:space-between;font-size:14px;color:var(--muted);padding:3px 0}
.tr.g{font-size:18px;font-weight:800;color:var(--ink);border-top:1px dashed rgba(0,0,0,.15);margin-top:6px;padding-top:9px}
.send{margin-top:14px;width:100%;height:56px;border-radius:15px;background:var(--brand);color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;gap:9px}
.send.dim{background:var(--surface-2);color:var(--faint);pointer-events:none}
.state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 30px;gap:14px;color:var(--muted)}
.state .ic{font-size:52px}
.spin{width:38px;height:38px;border:3px solid var(--surface-2);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ok{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:50px 30px;gap:8px}
.ok .ring{width:84px;height:84px;border-radius:50%;background:#E6F1EE;color:var(--pos);display:grid;place-items:center;font-size:44px;margin-bottom:8px;animation:pop .45s cubic-bezier(.2,.9,.3,1.4)}
@keyframes pop{from{transform:scale(.4);opacity:0}to{transform:none;opacity:1}}
.ok h2{font-size:24px;font-weight:800}.ok p{color:var(--muted);max-width:280px}
.ok .ord{font-weight:800;color:var(--brand-deep);font-size:15px;background:var(--surface-2);padding:8px 16px;border-radius:10px;margin-top:6px}
.ok .more{margin-top:20px;height:52px;padding:0 26px;border-radius:14px;background:var(--brand);color:#fff;font-weight:800;font-size:15px}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;z-index:60;animation:up .25s}
</style>
</head>
<body>
<script>var QR_TOKEN="{{ token }}";</script>
{% raw %}
<div id="app" v-cloak>
  <div class="wrap">
    <!-- loading -->
    <div v-if="phase==='loading'" class="state"><div class="spin"></div><p>{{ t('loading') }}</p></div>
    <!-- invalid -->
    <div v-else-if="phase==='invalid'" class="state"><div class="ic">🔒</div><b>{{ t('invalid') }}</b><p>{{ errMsg }}</p></div>
    <!-- success -->
    <div v-else-if="phase==='done'" class="ok">
      <div class="ring">✓</div>
      <h2>{{ t('sent') }}</h2>
      <p>{{ t('sentsub') }}</p>
      <div class="ord">{{ t('order') }} {{ lastOrder }}</div>
      <button class="more" @click="orderMore">{{ t('ordermore') }}</button>
    </div>

    <!-- menu -->
    <template v-else>
      <div class="hero">
        <div class="hero-top">
          <div class="mark"><div class="logo">α</div><div><b>{{ outlet || 'AlphaX' }}</b><span>{{ t('tagline') }}</span></div></div>
          <button class="lang" @click="toggleLang">{{ lang==='en' ? 'العربية' : 'EN' }}</button>
        </div>
        <div class="table-pill" v-if="table">🪑 {{ t('table') }} {{ table }}</div>
      </div>

      <div class="cats">
        <button v-for="g in groups" :key="g" class="cat" :class="{on:activeGroup===g}" @click="activeGroup=g">{{ g }}</button>
      </div>

      <div class="list">
        <div v-if="!items.length" class="state" style="padding:50px 20px"><div class="ic">🍽️</div><p>{{ t('nomenu') }}</p></div>
        <div class="sec-title">{{ activeGroup }}</div>
        <div v-for="it in groupItems" :key="it.item_code" class="item">
          <div class="thumb"><img v-if="it.image" :src="it.image" :alt="it.item_name"><template v-else>{{ emoji(it.item_name) }}</template></div>
          <div class="info"><div class="nm">{{ it.item_name }}</div><div class="pr"><span class="cur">{{ currency }}</span> <span class="num">{{ it.rate.toFixed(2) }}</span></div></div>
          <div v-if="qtyOf(it.item_code)" class="stepper">
            <button @click="dec(it)">−</button><span class="n num">{{ qtyOf(it.item_code) }}</span><button @click="inc(it)">+</button>
          </div>
          <button v-else class="add" @click="inc(it)">+</button>
        </div>
      </div>

      <div class="barbtn">
        <button class="review" :class="{dim:!cartCount}" @click="showCart=true">
          <span class="count num">{{ cartCount }}</span>{{ t('review') }}
          <span class="amt"><span style="font-size:12px;opacity:.85">{{ currency }}</span> <span class="num">{{ cartTotal.toFixed(2) }}</span></span>
        </button>
      </div>

      <!-- cart sheet -->
      <div class="scrim" v-if="showCart" @click.self="showCart=false">
        <div class="sheet">
          <div class="sheet-h"><h3>{{ t('yourorder') }}</h3><button class="x" @click="showCart=false">✕</button></div>
          <div class="sheet-body">
            <div v-for="l in cart" :key="l.item_code" class="cl">
              <div class="info"><div class="nm">{{ l.item_name }}</div><div class="pr"><span class="num">{{ currency }} {{ l.rate.toFixed(2) }}</span></div></div>
              <div class="stepper"><button @click="dec(l)">−</button><span class="n num">{{ l.qty }}</span><button @click="inc(l)">+</button></div>
            </div>
            <div class="cust">
              <label>{{ t('name') }}</label><input v-model="custName" :placeholder="t('nameph')">
              <label>{{ t('phone') }}</label><input v-model="custPhone" :placeholder="t('phoneph')" inputmode="tel">
            </div>
            <div class="totals">
              <div class="tr"><span>{{ t('items') }}</span><span class="num">{{ cartCount }}</span></div>
              <div class="tr g"><span>{{ t('total') }}</span><span><span style="font-size:13px;color:var(--faint)">{{ currency }}</span> <span class="num">{{ cartTotal.toFixed(2) }}</span></span></div>
            </div>
            <div style="font-size:11.5px;color:var(--faint);text-align:center;margin-top:8px">{{ t('vatnote') }}</div>
            <button class="send" :class="{dim:!cartCount||sending}" @click="submit">
              <span v-if="sending" class="spin" style="width:20px;height:20px;border-width:2px"></span>
              <span v-else>🍽️ {{ t('send') }}</span>
            </button>
          </div>
        </div>
      </div>

      <div class="toast" v-if="toastMsg">{{ toastMsg }}</div>
    </template>
  </div>
</div>
<script src="/assets/alphax_pos_suite/js/vue.global.prod.min.js"></script>
<script>
const M='alphax_pos_suite.alphax_pos_suite.api.';
async function fc(method,args){const r=await fetch('/api/method/'+method,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(args||{})});const d=await r.json();return d.message;}
const EMO={coffee:'☕',tea:'🍵',cold:'🧊',juice:'🥤',bakery:'🥐',bread:'🍞',cake:'🍰',dessert:'🍰',sandwich:'🥪',burger:'🍔',pizza:'🍕',chicken:'🍗',rice:'🍚',salad:'🥗',shakshuka:'🍳',default:'🍽️'};
function emoji(n){n=(n||'').toLowerCase();for(const k in EMO){if(n.includes(k))return EMO[k];}return EMO.default;}
const T={en:{loading:'Loading menu…',invalid:'Table not available',sent:'Order sent!',sentsub:'Your order is on its way to the kitchen. A team member will confirm shortly.',order:'Order',ordermore:'Order more',tagline:'Scan · Order · Relax',table:'Table',nomenu:'Menu is being set up. Please ask our staff.',review:'Review order',yourorder:'Your order',name:'Name (optional)',nameph:'Your name',phone:'Mobile (optional)',phoneph:'05x xxx xxxx',items:'Items',total:'Total',vatnote:'Prices include applicable VAT. Final bill confirmed at checkout.',send:'Send to kitchen'},ar:{loading:'جارٍ تحميل القائمة…',invalid:'الطاولة غير متاحة',sent:'تم إرسال الطلب!',sentsub:'طلبك في طريقه إلى المطبخ. سيؤكده أحد موظفينا قريبًا.',order:'طلب',ordermore:'طلب المزيد',tagline:'امسح · اطلب · استرخِ',table:'طاولة',nomenu:'يتم إعداد القائمة. يرجى سؤال الموظفين.',review:'مراجعة الطلب',yourorder:'طلبك',name:'الاسم (اختياري)',nameph:'اسمك',phone:'الجوال (اختياري)',phoneph:'05x xxx xxxx',items:'الأصناف',total:'الإجمالي',vatnote:'الأسعار شاملة الضريبة. تُؤكد الفاتورة النهائية عند الدفع.',send:'إرسال للمطبخ'}};
const {createApp}=Vue;
createApp({
  data(){return{phase:'loading',errMsg:'',lang:'en',outlet:'',table:'',currency:'SAR',groups:[],items:[],activeGroup:'',cart:[],custName:'',custPhone:'',showCart:false,sending:false,lastOrder:'',toastMsg:'',_tt:null};},
  computed:{
    groupItems(){return this.items.filter(i=>i.item_group===this.activeGroup);},
    cartCount(){return this.cart.reduce((s,l)=>s+l.qty,0);},
    cartTotal(){return this.cart.reduce((s,l)=>s+l.qty*l.rate,0);},
  },
  methods:{
    t(k){return (T[this.lang]&&T[this.lang][k])||k;},
    emoji,
    toggleLang(){this.lang=this.lang==='en'?'ar':'en';document.body.dir=this.lang==='ar'?'rtl':'ltr';},
    qtyOf(code){const l=this.cart.find(x=>x.item_code===code);return l?l.qty:0;},
    inc(it){let l=this.cart.find(x=>x.item_code===it.item_code);if(l)l.qty++;else this.cart.push({item_code:it.item_code,item_name:it.item_name,rate:it.rate,qty:1});},
    dec(it){const i=this.cart.findIndex(x=>x.item_code===it.item_code);if(i<0)return;this.cart[i].qty--;if(this.cart[i].qty<=0)this.cart.splice(i,1);},
    toast(m){this.toastMsg=m;clearTimeout(this._tt);this._tt=setTimeout(()=>this.toastMsg='',2400);},
    async load(){
      if(!QR_TOKEN){this.phase='invalid';this.errMsg='No table token in the link.';return;}
      try{
        const r=await fc(M+'get_qr_menu',{token:QR_TOKEN});
        if(!r||!r.ok){this.phase='invalid';this.errMsg=(r&&r.message)||'This QR code is not active.';return;}
        this.outlet=r.outlet;this.table=r.table;this.currency=r.currency||'SAR';
        this.groups=r.groups||[];this.items=r.items||[];this.activeGroup=this.groups[0]||'';
        this.phase='menu';
      }catch(e){this.phase='invalid';this.errMsg='Could not load the menu. Please try again.';}
    },
    async submit(){
      if(!this.cartCount||this.sending)return;this.sending=true;
      try{
        const r=await fc(M+'submit_qr_order',{token:QR_TOKEN,customer_name:this.custName,customer_phone:this.custPhone,items:this.cart.map(l=>({item_code:l.item_code,qty:l.qty}))});
        if(r&&r.ok){this.lastOrder=r.order;this.showCart=false;this.phase='done';this.cart=[];}
        else{this.toast((r&&r.message)||'Could not send order');}
      }catch(e){this.toast('Network error — try again');}
      this.sending=false;
    },
    orderMore(){this.phase='menu';this.custName='';this.custPhone='';},
  },
  mounted(){this.load();},
}).mount('#app');
</script>
{% endraw %}
</body>
</html>
