<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table QR Codes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--brand:#0B6B5B;--brand-deep:#084A3F;--accent:#B8860B;--ink:#1C1A17;--muted:#6B6760;--border:#E0DACE}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#F2EFE8;color:var(--ink);padding:24px}
.bar{max-width:900px;margin:0 auto 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.bar h1{font-size:18px;font-weight:800}
.bar .sub{font-size:12.5px;color:var(--muted)}
.btns{display:flex;gap:8px}
.btn{height:40px;padding:0 16px;border-radius:11px;font-weight:700;font-size:13px;border:none;cursor:pointer}
.btn.primary{background:var(--brand);color:#fff}.btn.ghost{background:#fff;border:1px solid var(--border);color:var(--ink)}
.grid{max-width:900px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px}
.card{background:#fff;border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;page-break-inside:avoid}
.card .outlet{font-size:12px;font-weight:700;color:var(--brand-deep);letter-spacing:.4px;text-transform:uppercase}
.card .tbl{font-size:13px;color:var(--muted);font-weight:600}
.card .tnum{font-size:30px;font-weight:800;line-height:1;margin:2px 0 4px}
.card .qr{width:190px;height:190px;display:grid;place-items:center}
.card .qr svg{width:100%;height:100%}
.card .scan{font-size:13px;font-weight:700;color:var(--ink)}
.card .scan .ar{display:block;font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--muted);font-weight:500;margin-top:2px}
.card .brand{display:flex;align-items:center;gap:7px;margin-top:4px;font-size:11px;color:var(--muted);font-weight:600}
.card .brand .dot{width:18px;height:18px;border-radius:6px;background:linear-gradient(145deg,var(--brand),var(--brand-deep));color:#fff;display:grid;place-items:center;font-size:11px;font-weight:800}
.empty{max-width:560px;margin:60px auto;text-align:center;color:var(--muted)}
.empty .ic{font-size:48px}
@media print{
  body{background:#fff;padding:0}
  .bar{display:none}
  .grid{gap:0}
  .card{border:1px dashed #bbb;border-radius:0;margin:0}
}
</style>
</head>
<body>
  <div class="bar">
    <div><h1>Table Order QR Codes</h1><div class="sub" id="count"></div></div>
    <div class="btns">
      <button class="btn ghost" onclick="window.close()">Close</button>
      <button class="btn primary" onclick="window.print()">🖨️ Print</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">
    <div class="ic">🔖</div>
    <p>No active QR token found.<br>Open the table and click <b>Order QR → Show / Print Order QR</b> first.</p>
  </div>

<script>var CARDS = {{ cards_json | safe }};</script>
<script src="/assets/alphax_pos_suite/js/qrcode.min.js"></script>
<script>
(function(){
  var grid = document.getElementById('grid');
  var cnt = document.getElementById('count');
  if(!CARDS || !CARDS.length){
    document.getElementById('empty').style.display='block';
    cnt.textContent=''; return;
  }
  cnt.textContent = CARDS.length + (CARDS.length===1 ? ' table' : ' tables') + ' · scan to order at the table';
  CARDS.forEach(function(c, i){
    var qr = qrcode(0, 'M');
    qr.addData(c.url);
    qr.make();
    var svg = qr.createSvgTag({ cellSize: 5, margin: 1, scalable: true });
    var card = document.createElement('div');
    card.className = 'card';
    card.innerHTML =
      '<div class="outlet">'+ (c.outlet || 'AlphaX POS') +'</div>' +
      '<div class="tbl">TABLE</div>' +
      '<div class="tnum">'+ (c.table || '') +'</div>' +
      '<div class="qr">'+ svg +'</div>' +
      '<div class="scan">Scan to order<span class="ar">امسح للطلب من طاولتك</span></div>' +
      '<div class="brand"><span class="dot">α</span>AlphaX POS</div>';
    grid.appendChild(card);
  });
})();
</script>
</body>
</html>
